name: Spec Agent

on:
  issues:
    types: [labeled]

jobs:
  create-spec:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine spec filename
        id: naming
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          LAST_NUM=$(find specs -name "[0-9][0-9][0-9]-*.md" | sort | tail -n 1 | xargs basename 2>/dev/null | grep -oP '^\d+' || echo "0")
          NEXT_NUM=$(printf "%03d" $((10#$LAST_NUM + 1)))
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | cut -c1-40)
          echo "file=specs/${NEXT_NUM}-${SLUG}.md" >> $GITHUB_OUTPUT
          echo "branch=spec/issue-${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Create feature branch
        run: |
          git checkout -b "${{ steps.naming.outputs.branch }}"

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: echo "$ISSUE_BODY" > /tmp/issue-body.txt

      - name: Run Spec Agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SPEC_FILE: ${{ steps.naming.outputs.file }}
        run: |
          npx opencode-ai@latest run --model openrouter/zhipuai/glm-4 --dangerously-skip-permissions "
          Read agents/spec/system-prompt.md for your role and rules.

          Create a spec file at ${SPEC_FILE} for this GitHub issue:
          - Issue number: ${ISSUE_NUMBER}
          - Issue title: ${ISSUE_TITLE}
          - Full description: read from /tmp/issue-body.txt

          Follow specs/_template.md exactly.
          Make ALL acceptance criteria browser-observable and testable with Playwright.
          Use your file write tool to write the spec to ${SPEC_FILE}." \
          | tee /tmp/opencode-output.txt || true

          # Fallback: if opencode output the spec as text instead of writing it,
          # extract markdown content (from first heading onward) and write it
          if [ ! -f "${SPEC_FILE}" ]; then
            echo "Spec file not written by tool — using stdout output as fallback"
            sed -n '/^# /,$ p' /tmp/opencode-output.txt > "${SPEC_FILE}"
          fi

      - name: Verify spec file was created
        run: |
          if [ ! -f "${{ steps.naming.outputs.file }}" ] || [ ! -s "${{ steps.naming.outputs.file }}" ]; then
            echo "Error: Spec file was not created or is empty at ${{ steps.naming.outputs.file }}"
            cat /tmp/opencode-output.txt || true
            exit 1
          fi

      - name: Commit and push spec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Spec Agent"
          git config user.email "spec-agent@github-actions.bot"
          git add specs/
          git commit -m "spec: add spec for issue #${{ github.event.issue.number }}"
          git push origin "${{ steps.naming.outputs.branch }}"

      - name: Create draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "spec: ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          Generated spec for issue #${{ github.event.issue.number }}. Review the acceptance criteria, then merge to trigger the dev agent." \
            --base main \
            --head "${{ steps.naming.outputs.branch }}" \
            --draft

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 Spec agent created a draft PR. Review the acceptance criteria and merge it to start development.'
            });
