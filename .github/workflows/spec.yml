name: Spec Agent

on:
  issues:
    types: [labeled]

jobs:
  create-spec:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine spec filename
        id: naming
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          LAST_NUM=$(find specs -name "[0-9][0-9][0-9]-*.md" | sort | tail -n 1 | xargs basename 2>/dev/null | grep -oP '^\d+' || echo "0")
          NEXT_NUM=$(printf "%03d" $((10#$LAST_NUM + 1)))
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | cut -c1-40)
          echo "file=specs/${NEXT_NUM}-${SLUG}.md" >> $GITHUB_OUTPUT
          echo "branch=spec/issue-${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Create feature branch
        run: |
          git checkout -b "${{ steps.naming.outputs.branch }}"

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: echo "$ISSUE_BODY" > /tmp/issue-body.txt

      - name: Run Spec Agent
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          SPEC_FILE: ${{ steps.naming.outputs.file }}
        run: |
          # Capture stdout+stderr so we can use output as fallback
          npx opencode-ai@latest run --model zai-coding-plan/glm-4.7 \
            --dangerously-skip-permissions \
            "Read agents/spec/system-prompt.md for your role and rules.
            Create a spec file at ${SPEC_FILE} for GitHub issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
            Full description: read /tmp/issue-body.txt
            Follow specs/_template.md. All criteria must be browser-observable with Playwright.
            Use your file write tool to write the spec to ${SPEC_FILE}." \
            > /tmp/opencode-output.txt 2>&1 || true

          echo "=== opencode raw output ==="
          cat /tmp/opencode-output.txt
          echo "=== end output ==="

          # Fallback: if opencode didn't use the write tool, extract content from output
          if [ ! -s "${SPEC_FILE}" ]; then
            echo "File not written by tool — trying stdout fallback..."
            # Strip ANSI escape codes
            sed 's/\x1B\[[0-9;]*[A-Za-z]//g' /tmp/opencode-output.txt > /tmp/clean-output.txt
            # Extract from first markdown heading onward
            sed -n '/^#[[:space:]]/,$ p' /tmp/clean-output.txt > "${SPEC_FILE}" || true
            # Last resort: use full cleaned output
            if [ ! -s "${SPEC_FILE}" ]; then
              cp /tmp/clean-output.txt "${SPEC_FILE}"
            fi
          fi

      - name: Verify spec file was created
        run: |
          if [ ! -s "${{ steps.naming.outputs.file }}" ]; then
            echo "Error: Spec file is missing or empty"
            exit 1
          fi
          echo "Spec file created successfully:"
          cat "${{ steps.naming.outputs.file }}"

      - name: Commit and push spec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Spec Agent"
          git config user.email "spec-agent@github-actions.bot"
          git add specs/
          git diff --staged --quiet || git commit -m "spec: add spec for issue #${{ github.event.issue.number }}"
          git push --force origin "${{ steps.naming.outputs.branch }}"

      - name: Create draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "spec: ${{ github.event.issue.title }}" \
            --body "Closes #${{ github.event.issue.number }}

          Generated spec for issue #${{ github.event.issue.number }}. Review the acceptance criteria, then merge to trigger the dev agent." \
            --base main \
            --head "${{ steps.naming.outputs.branch }}" \
            --draft

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 Spec agent created a draft PR. Review the acceptance criteria and merge it to start development.'
            });
