name: Spec Agent

on:
  issues:
    types: [labeled]

jobs:
  create-spec:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine branch + fallback name
        id: naming
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # The agent decides the actual spec path per agents/spec/system-prompt.md
          # (capability → specs/<kebab>.md; chore → specs/NNN-slug.md; it may
          # also tombstone/promote other specs). This is only a fallback name
          # for the chore case.
          LAST_NUM=$(find specs -name "[0-9][0-9][0-9]-*.md" | sort | tail -n 1 | xargs basename 2>/dev/null | grep -oP '^\d+' || echo "0")
          NEXT_NUM=$(printf "%03d" $((10#$LAST_NUM + 1)))
          SLUG=$(echo "$ISSUE_TITLE" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd '[:alnum:]-' | cut -c1-40)
          echo "fallback=specs/${NEXT_NUM}-${SLUG}.md" >> $GITHUB_OUTPUT
          echo "branch=spec/issue-${{ github.event.issue.number }}" >> $GITHUB_OUTPUT

      - name: Create feature branch
        run: |
          git checkout -b "${{ steps.naming.outputs.branch }}"

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: echo "$ISSUE_BODY" > /tmp/issue-body.txt

      - name: Run Spec Agent
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          FALLBACK_FILE: ${{ steps.naming.outputs.fallback }}
        run: |
          npx opencode-ai@1.15.3 run --model zai-coding-plan/glm-4.7 \
            --dangerously-skip-permissions \
            "Read agents/spec/system-prompt.md for your role and rules, and
            specs/_template.md for structure.
            GitHub issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}
            Full description: read /tmp/issue-body.txt — follow its instructions.
            Classify the request and choose the spec path yourself per the
            system prompt: a capability → specs/<kebab>.md (Status active,
            with a Regression Test pointer); a cleanup/refactor → a chore
            spec (Status chore, you may use ${FALLBACK_FILE}). You may also
            promote/edit or tombstone existing specs as the prompt directs.
            All acceptance criteria must be browser-observable with Playwright.
            Use your file write tool to write all spec file(s) under specs/.

            CRITICAL: write FILES ONLY. Do NOT run git, gh, or any shell —
            no commit, branch, checkout, push, or PR. CI performs ALL
            version control. Just leave the spec file(s) on disk."

      - name: Verify and publish spec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.naming.outputs.branch }}"
          git config user.name "Spec Agent"
          git config user.email "spec-agent@github-actions.bot"
          git fetch origin main

          # Resilient to a rogue agent that committed on its own branch:
          # compare working tree / HEAD to origin/main, which catches the
          # spec whether it was left uncommitted OR self-committed.
          git add -A
          CHANGES=$(git diff --name-only origin/main -- specs/ | grep -v '^specs/_template\.md$' || true)
          if [ -z "$CHANGES" ]; then
            echo "Error: the spec agent produced no changes under specs/"
            exit 1
          fi
          while IFS=$'\t' read -r st path; do
            [ "$st" = "D" ] && continue
            if [ ! -s "$path" ]; then echo "Error: $path is empty"; exit 1; fi
          done < <(git diff --name-status origin/main -- specs/ | grep -v '_template\.md$')
          echo "Spec changes vs main:"
          git diff --name-status origin/main -- specs/

          # Publish onto the intended branch regardless of what the agent
          # did: -B repoints/keeps BRANCH at the current HEAD (adopting an
          # agent commit if there is one); then commit any uncommitted spec.
          git checkout -B "$BRANCH"
          git add -A specs/
          git diff --cached --quiet -- specs/ || git commit -m "spec: issue #${{ github.event.issue.number }}"
          git push --force origin "$BRANCH"

      - name: Create draft PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          gh pr create \
            --title "spec: ${ISSUE_TITLE}" \
            --body "Closes #${{ github.event.issue.number }}

          Generated spec for issue #${{ github.event.issue.number }}. Review the acceptance criteria, then merge to trigger the dev agent." \
            --base main \
            --head "${{ steps.naming.outputs.branch }}" \
            --draft || true

      - name: Comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 Spec agent created a draft PR. Review the acceptance criteria and merge it to start development.'
            });
