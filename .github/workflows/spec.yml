name: Spec Agent

on:
  issues:
    types: [labeled]

jobs:
  create-spec:
    if: github.event.label.name == 'feature-request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Spec Agent
        uses: anthropic/claude-action@v1
        with:
          prompt: |
            Create a spec for this feature request:
            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}
            ${{ github.event.issue.body }}

            Follow the template in specs/_template.md
            Create a new spec file with a unique ID
            Open a draft PR with just the spec
          system-prompt: agents/spec/system-prompt.md
          max-tokens: 4000

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📝 Spec agent has created a draft PR. Review the spec and merge it to start development.'
            })
