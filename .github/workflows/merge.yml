name: Auto Merge

on:
  workflow_run:
    workflows: ["Verification Agent"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to merge (e.g. 18)'
        required: true

jobs:
  auto-merge:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number;
            if (context.eventName === 'workflow_dispatch') {
              number = parseInt('${{ inputs.pr_number }}');
            } else {
              const prs = JSON.parse('${{ toJson(github.event.workflow_run.pull_requests) }}');
              if (prs.length > 0) {
                number = prs[0].number;
              } else {
                // workflow_run via workflow_dispatch: find latest open feat/ PR
                const { data: openPrs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  sort: 'updated',
                  direction: 'desc',
                });
                const pr = openPrs.find(p => p.head.ref.startsWith('feat/'));
                if (!pr) { core.setFailed('No open feat/ PR found'); return; }
                number = pr.number;
              }
            }
            core.setOutput('number', String(number));

      - name: Check merge conditions
        id: check
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          # Block PRs that touch protected paths
          PROTECTED=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files \
            --jq '.[].filename' \
            | grep -E '^(fixtures/|agents/tjansteman/|CLAUDE\.md|\.github/workflows/)' || true)

          # Block oversized diffs
          DIFF_LINES=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} \
            --jq '.additions + .deletions')

          if [ -n "$PROTECTED" ]; then
            echo "status=blocked" >> $GITHUB_OUTPUT
            echo "reason=Protected paths modified: ${PROTECTED}" >> $GITHUB_OUTPUT
          elif [ "${DIFF_LINES}" -gt 400 ]; then
            echo "status=blocked" >> $GITHUB_OUTPUT
            echo "reason=Diff too large (${DIFF_LINES} lines changed)" >> $GITHUB_OUTPUT
          else
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "reason=All checks passed, diff within limits" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR
        if: steps.check.outputs.status == 'ready'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --squash --delete-branch

      - name: Comment merge result
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';
            const reason = '${{ steps.check.outputs.reason }}';
            const emoji = status === 'ready' ? '🚀' : '🚫';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Auto-merge: ${status}\n\n${reason}`,
            });

      - name: Label source issue as implemented
        if: steps.check.outputs.status == 'ready'
        uses: actions/github-script@v7
        with:
          script: |
            // Find spec file from impl PR body ("Implements spec in specs/NNN-...")
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }},
            });
            const specMatch = pr.body?.match(/specs\/[^\s]+\.md/);
            if (!specMatch) return;
            const specFile = specMatch[0];

            // Find the commit that introduced the spec file
            const { execSync } = require('child_process');
            const specCommit = execSync(`git log --all --oneline -- "${specFile}" | tail -1 | awk '{print $1}'`).toString().trim();
            if (!specCommit) return;

            // Find the PR that contained that commit
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: specCommit,
            });
            if (!prs.length) return;
            const specPrBody = prs[0].body || '';

            // Extract issue number from "Closes #N" or "issue #N"
            const issueMatch = specPrBody.match(/#(\d+)/);
            if (!issueMatch) return;
            const issueNumber = parseInt(issueMatch[1]);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['implemented'],
            });
