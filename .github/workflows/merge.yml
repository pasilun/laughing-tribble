name: Auto Merge

on:
  workflow_run:
    workflows: ["Verification Agent"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT

      - name: Check merge conditions
        id: check
        if: steps.pr.outputs.number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          # Block PRs that touch protected paths
          PROTECTED=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files \
            --jq '.[].filename' \
            | grep -E '^(fixtures/|agents/tjansteman/|CLAUDE\.md|\.github/workflows/)' || true)

          # Block oversized diffs
          DIFF_LINES=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER} \
            --jq '.additions + .deletions')

          if [ -n "$PROTECTED" ]; then
            echo "status=blocked" >> $GITHUB_OUTPUT
            echo "reason=Protected paths modified: ${PROTECTED}" >> $GITHUB_OUTPUT
          elif [ "${DIFF_LINES}" -gt 400 ]; then
            echo "status=blocked" >> $GITHUB_OUTPUT
            echo "reason=Diff too large (${DIFF_LINES} lines changed)" >> $GITHUB_OUTPUT
          else
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "reason=All checks passed, diff within limits" >> $GITHUB_OUTPUT
          fi

      - name: Merge PR
        if: steps.check.outputs.status == 'ready'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.number }} --squash --delete-branch

      - name: Comment merge result
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.check.outputs.status }}';
            const reason = '${{ steps.check.outputs.reason }}';
            const emoji = status === 'ready' ? '🚀' : '🚫';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Auto-merge: ${status}\n\n${reason}`
            });
