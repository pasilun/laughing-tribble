name: Dev Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'specs/**'

jobs:
  dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find spec file
        id: spec
        run: |
          SPEC_FILE=$(git diff origin/${{ github.base_ref }}...HEAD --name-only | grep '^specs/[^_].*\.md$' | head -n 1)
          if [ -z "$SPEC_FILE" ]; then
            SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f | sort | tail -n 1)
          fi
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "Found spec: $SPEC_FILE"

      - name: Run Dev Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          SPEC_FILE: ${{ steps.spec.outputs.file }}
        run: |
          npx opencode run --dangerously-skip-permissions "
          Read agents/dev/system-prompt.md for your role and rules.

          Your task: implement the feature described in ${SPEC_FILE}.

          Steps:
          1. Read ${SPEC_FILE} to understand all acceptance criteria
          2. Explore app/ and components/ to understand existing patterns
          3. Implement the feature using Next.js App Router + TypeScript + Tailwind CSS
          4. Write or update e2e tests in e2e/ that cover each acceptance criterion
          5. Do NOT commit or push — just write the code files"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Commit and push implementation
        run: |
          git config user.name "Dev Agent"
          git config user.email "dev-agent@github-actions.bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — feature may already be implemented"
          else
            SPEC_NAME=$(basename "${{ steps.spec.outputs.file }}" .md)
            git commit -m "feat: implement ${SPEC_NAME}"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Comment results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Dev agent: ${status}`
            });
