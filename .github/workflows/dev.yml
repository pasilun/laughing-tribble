name: Dev Agent

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Spec file path (e.g. specs/002-foo.md)'
        required: false
      failure_report:
        description: 'Verification failure details from previous run'
        required: false

jobs:
  # Decides which attempt this is and which model to use. The feature branch
  # is cumulative, so commits-ahead-of-main is a real attempt counter.
  # With MAX = vars.LOOP_MAX_ATTEMPTS (default 3): C in 0..MAX-1 -> normal
  # (glm-4.7); C == MAX -> escalate (glm-5.1, gated by the "escalation"
  # Environment); C > MAX -> stop (handled by verify).
  gate:
    runs-on: ubuntu-latest
    outputs:
      spec_file: ${{ steps.g.outputs.spec_file }}
      branch: ${{ steps.g.outputs.branch }}
      mode: ${{ steps.g.outputs.mode }}
      model: ${{ steps.g.outputs.model }}
      attempt: ${{ steps.g.outputs.attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve spec / branch / attempt / mode
        id: g
        run: |
          # ---- escalation tunables ----
          # Tune the cap via the LOOP_MAX_ATTEMPTS repo variable (no code change).
          MAX_NORMAL="${{ vars.LOOP_MAX_ATTEMPTS || '3' }}"
          STOP_AT=$((MAX_NORMAL + 1))
          BASE_MODEL="zai-coding-plan/glm-4.7"
          ESC_MODEL="zai-coding-plan/glm-5.1"
          # -----------------------------

          # Status of a spec file (active|planned|chore|superseded|obsolete|"")
          spec_status() {
            awk '/^## Status/{s=1;next} s{ if($0~/^<!--/){c=1} if(c){ if($0~/-->/)c=0; next} if($0~/^[[:space:]]*$/)next; if(match($0,/`(active|planned|superseded|obsolete|chore)`/)){print substr($0,RSTART+1,RLENGTH-2);exit} exit }' "$1" 2>/dev/null
          }

          if [ -n "${{ inputs.spec_file }}" ]; then
            SPEC_FILE="${{ inputs.spec_file }}"
          else
            # A spec PR can touch several files (new capability + a
            # tombstone). Pick the first changed spec that is NOT a
            # tombstone — never resume on a superseded/obsolete spec.
            SPEC_FILE=""
            for f in $(git diff HEAD~1 --name-only | grep '^specs/[^_].*\.md$'); do
              st=$(spec_status "$f")
              if [ "$st" != "superseded" ] && [ "$st" != "obsolete" ]; then
                SPEC_FILE="$f"; break
              fi
            done
          fi
          if [ -z "$SPEC_FILE" ]; then
            SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f | sort | tail -n 1)
          fi
          SPEC_NAME=$(basename "$SPEC_FILE" .md)
          BRANCH="feat/${SPEC_NAME}"

          git fetch origin "$BRANCH" 2>/dev/null || true
          git fetch origin main 2>/dev/null || true
          C=$(git rev-list --count "origin/${BRANCH}" ^origin/main 2>/dev/null || echo "0")

          if [ "$C" -ge "$STOP_AT" ]; then
            MODE="stop";     MODEL="$ESC_MODEL"
          elif [ "$C" -ge "$MAX_NORMAL" ]; then
            MODE="escalate"; MODEL="$ESC_MODEL"
          else
            MODE="normal";   MODEL="$BASE_MODEL"
          fi

          echo "spec_file=$SPEC_FILE" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH"       >> "$GITHUB_OUTPUT"
          echo "mode=$MODE"           >> "$GITHUB_OUTPUT"
          echo "model=$MODEL"         >> "$GITHUB_OUTPUT"
          echo "attempt=$((C + 1))"   >> "$GITHUB_OUTPUT"
          echo "spec=$SPEC_FILE branch=$BRANCH commits=$C mode=$MODE model=$MODEL attempt=$((C + 1))"

  dev:
    needs: gate
    if: ${{ needs.gate.outputs.mode != 'stop' }}
    runs-on: ubuntu-latest
    # Escalated attempts run only after you approve them in the Actions tab.
    environment: ${{ needs.gate.outputs.mode == 'escalate' && 'escalation' || '' }}
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Switch to feature branch (cumulative — build on prior attempt)
        run: |
          BRANCH="${{ needs.gate.outputs.branch }}"
          git fetch origin
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Continuing from previous attempt on $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            echo "No existing branch — starting from origin/main"
            git checkout -B "$BRANCH" origin/main
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Dev Agent
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SPEC_FILE: ${{ needs.gate.outputs.spec_file }}
          FAILURE_REPORT: ${{ inputs.failure_report }}
          AGENT_MODEL: ${{ needs.gate.outputs.model }}
        run: |
          # Build the prompt in a FILE via env vars (printf) so the full
          # verifier verdict — JSON with quotes/backticks/newlines — reaches
          # the agent intact. Never interpolate it into a quoted CLI arg.
          {
            echo "Read agents/dev/system-prompt.md for your role and rules."
            echo ""
            echo "Your task: implement the feature described in ${SPEC_FILE}."
            echo ""
            if [ -n "$FAILURE_REPORT" ]; then
              echo "Your PREVIOUS attempt is already committed on this branch and FAILED verification."
              echo "Do NOT start over — read the current code (your prior work) and fix exactly these issues."
              echo "The verifier's full verdict (with network/console evidence) follows as JSON:"
              echo ""
              printf '%s\n' "$FAILURE_REPORT"
              echo ""
            else
              echo "This is the first implementation attempt."
            fi
            echo ""
            echo "Steps:"
            echo "1. Read ${SPEC_FILE} to understand all acceptance criteria and its required implementation approach"
            echo "2. Read the CURRENT state of app/ and components/ — your prior attempt's code is here"
            echo "3. Implement using Next.js App Router + TypeScript + Tailwind CSS"
            echo "4. Write or update e2e tests in e2e/ covering each acceptance criterion"
            echo "5. Run npm run typecheck and npm run lint — fix any errors before finishing"
            echo "6. Use your file write tool to write all code files to disk"
            echo "7. Do NOT run npm test, do NOT commit or push — just write the code files"
          } > /tmp/dev-prompt.txt

          npx opencode-ai@1.15.3 run --model "$AGENT_MODEL" \
            --dangerously-skip-permissions "$(cat /tmp/dev-prompt.txt)"

      - name: Typecheck
        id: typecheck
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee /tmp/typecheck-output.txt
        continue-on-error: true

      - name: Lint
        id: lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee /tmp/lint-output.txt
        continue-on-error: true

      - name: Fix lint/typecheck errors
        if: steps.typecheck.outcome == 'failure' || steps.lint.outcome == 'failure'
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          AGENT_MODEL: ${{ needs.gate.outputs.model }}
        run: |
          ERROR_REPORT=""
          if [ "${{ steps.typecheck.outcome }}" = "failure" ]; then
            ERROR_REPORT+="TypeScript errors (npm run typecheck):\n$(cat /tmp/typecheck-output.txt)\n\n"
          fi
          if [ "${{ steps.lint.outcome }}" = "failure" ]; then
            ERROR_REPORT+="ESLint errors (npm run lint):\n$(cat /tmp/lint-output.txt)\n"
          fi
          npx opencode-ai@1.15.3 run --model "$AGENT_MODEL" --dangerously-skip-permissions "
          Fix the following TypeScript and/or ESLint errors. Read the affected files, fix each error, and write the corrected files to disk. Do not change any feature logic — only fix type errors and linting violations.

          ${ERROR_REPORT}"

      # No hard typecheck/lint gate here: commit regardless so the next attempt
      # builds on this work, and let the Verification Agent be the source of
      # truth. A broken build will fail verification and feed back into the loop.
      - name: Commit and push (cumulative — no force)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ needs.gate.outputs.branch }}"
          SPEC_NAME="$(basename "${{ needs.gate.outputs.spec_file }}" .md)"
          ATTEMPT="${{ needs.gate.outputs.attempt }}"
          git config user.name "Dev Agent"
          git config user.email "dev-agent@github-actions.bot"
          git add -A
          if git diff --staged --quiet; then
            # Empty commit still advances the attempt counter so the loop
            # always terminates (escalation / stop) instead of spinning.
            git commit --allow-empty -m "chore(${SPEC_NAME}): dev attempt ${ATTEMPT} (no changes)"
          else
            git commit -m "feat(${SPEC_NAME}): dev attempt ${ATTEMPT}"
          fi
          git push origin "HEAD:${BRANCH}"
          if ! gh pr view "$BRANCH" >/dev/null 2>&1; then
            gh pr create \
              --title "feat: implement ${SPEC_NAME}" \
              --body "Implements spec in ${{ needs.gate.outputs.spec_file }}" \
              --base main \
              --head "$BRANCH" || true
          fi
