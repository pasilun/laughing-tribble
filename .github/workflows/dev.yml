name: Dev Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'specs/**'
  workflow_run:
    workflows: ["Spec Agent"]
    types: [completed]

jobs:
  dev:
    if: |
      github.event.workflow_run?.conclusion == 'success' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.changed_files, 'specs/'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            # Extract PR number from the workflow run
            echo "number=$(echo ${{ github.event.workflow_run.head_branch }} | grep -oP 'pr-\K\d+')" >> $GITHUB_OUTPUT
          fi

      - name: Find spec file
        id: spec
        run: |
          # Get the most recently modified spec file (excluding template)
          SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f -printf '%T@ %p\n' | sort -n | tail -1 | cut -d' ' -f2-)
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "name=$(basename $SPEC_FILE .md)" >> $GITHUB_OUTPUT

      - name: Run Dev Agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx opencode dev-agent \
            --spec-file "${{ steps.spec.outputs.file }}" \
            --spec-name "${{ steps.spec.outputs.name }}" \
            --pr-number "${{ steps.pr.outputs.number }}" \
            --system-prompt "agents/dev/system-prompt.md"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Comment results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Dev agent: ${status}`
            })

      - name: Fail on errors
        if: failure()
        run: exit 1
