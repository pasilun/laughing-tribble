name: Dev Agent

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
  workflow_dispatch:
    inputs:
      spec_file:
        description: 'Spec file path (e.g. specs/002-foo.md)'
        required: false
      failure_report:
        description: 'Verification failure details from previous run'
        required: false

jobs:
  dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find spec file
        id: spec
        run: |
          if [ -n "${{ inputs.spec_file }}" ]; then
            SPEC_FILE="${{ inputs.spec_file }}"
          else
            SPEC_FILE=$(git diff HEAD~1 --name-only | grep '^specs/[^_].*\.md$' | head -n 1)
          fi
          if [ -z "$SPEC_FILE" ]; then
            SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f | sort | tail -n 1)
          fi
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "Found spec: $SPEC_FILE"

      - name: Check iteration count
        id: iteration
        run: |
          SPEC_NAME=$(basename "${{ steps.spec.outputs.file }}" .md)
          BRANCH="feat/${SPEC_NAME}"
          git fetch origin "$BRANCH" 2>/dev/null || true
          COUNT=$(git rev-list --count "origin/${BRANCH}" ^origin/main 2>/dev/null || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Iteration count: $COUNT"
          if [ "$COUNT" -ge 4 ]; then
            echo "Max iterations reached (${COUNT} commits on branch). Stopping."
            exit 1
          fi

      - name: Run Dev Agent
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SPEC_FILE: ${{ steps.spec.outputs.file }}
          FAILURE_REPORT: ${{ inputs.failure_report }}
        run: |
          if [ -n "$FAILURE_REPORT" ]; then
            CONTEXT="Previous verification attempt FAILED. You must fix these issues:

          ${FAILURE_REPORT}

          Study the failures carefully. Each failing test tells you exactly what the verifier
          observed vs what it expected. Fix the implementation so all criteria pass."
          else
            CONTEXT="This is the first implementation attempt."
          fi

          npx opencode-ai@latest run --model zai-coding-plan/glm-4.7 --dangerously-skip-permissions "
          Read agents/dev/system-prompt.md for your role and rules.

          Your task: implement the feature described in ${SPEC_FILE}.

          ${CONTEXT}

          Steps:
          1. Read ${SPEC_FILE} to understand all acceptance criteria
          2. Explore app/ and components/ to understand existing patterns
          3. Implement the feature using Next.js App Router + TypeScript + Tailwind CSS
          4. Write or update e2e tests in e2e/ that cover each acceptance criterion
          5. Use your file write tool to write all code files to disk
          6. Do NOT run npm test, do NOT commit or push — just write the code files"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Commit and push implementation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPEC_NAME=$(basename "${{ steps.spec.outputs.file }}" .md)
          BRANCH="feat/${SPEC_NAME}"
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          git config user.name "Dev Agent"
          git config user.email "dev-agent@github-actions.bot"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit — feature may already be implemented"
          else
            git commit -m "feat: implement ${SPEC_NAME}"
            git push --force origin "$BRANCH"
            gh pr create \
              --title "feat: implement ${SPEC_NAME}" \
              --body "Implements spec in ${{ steps.spec.outputs.file }}" \
              --base main \
              --head "$BRANCH" || true
          fi

      - name: Trigger verify on retry runs
        if: inputs.failure_report != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPEC_NAME=$(basename "${{ steps.spec.outputs.file }}" .md)
          PR_NUMBER=$(gh pr list --head "feat/${SPEC_NAME}" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh workflow run verify.yml --field pr_number="$PR_NUMBER"
          fi

      - name: Comment results
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: 15,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Dev agent: ${status}`
            });
