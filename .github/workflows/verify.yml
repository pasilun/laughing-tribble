name: Verification Agent

on:
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify (e.g. 18)'
        required: true

jobs:
  verify:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: write
      contents: write
    steps:
      - name: Resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number, sha, branch;
            if (context.eventName === 'pull_request') {
              number = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
              branch = context.payload.pull_request.head.ref;
            } else if (context.eventName === 'workflow_dispatch') {
              number = parseInt('${{ inputs.pr_number }}');
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
              });
              sha = pr.head.sha;
              branch = pr.head.ref;
            } else {
              // workflow_run: find the latest open feat/ PR
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
              });
              const pr = prs.find(p => p.head.ref.startsWith('feat/'));
              if (!pr) { core.setFailed('No open feat/ PR found'); return; }
              number = pr.number;
              sha = pr.head.sha;
              branch = pr.head.ref;
            }
            core.setOutput('number', String(number));
            core.setOutput('sha', sha);
            core.setOutput('branch', branch);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview to Vercel
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          OUTPUT=$(npx vercel --token $VERCEL_TOKEN --yes 2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v 'vercel\.com' | head -1)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Find spec file
        id: spec
        run: |
          BRANCH="${{ steps.pr.outputs.branch }}"
          SPEC_NAME="${BRANCH#feat/}"
          SPEC_FILE=$(find specs -name "${SPEC_NAME}.md" -not -name "_template.md" | head -1)
          if [ -z "$SPEC_FILE" ]; then
            SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" | sort | tail -1)
          fi
          SPEC_ID=$(basename "$SPEC_FILE" .md)
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "spec_id=$SPEC_ID" >> $GITHUB_OUTPUT
          echo "Found spec: $SPEC_FILE (ID: $SPEC_ID)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate verification tests from spec
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SPEC_FILE: ${{ steps.spec.outputs.file }}
          SPEC_ID: ${{ steps.spec.outputs.spec_id }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          TARGET_FILE="e2e/_verified-${SPEC_ID}.spec.ts"
          npx opencode-ai@latest run --model zai-coding-plan/glm-4.7 --dangerously-skip-permissions "
          Read agents/verifier/system-prompt.md for your role and rules.

          Spec file: ${SPEC_FILE}
          Preview URL: ${PREVIEW_URL}

          Your task: write a Playwright test file at ${TARGET_FILE} that independently
          verifies every acceptance criterion in ${SPEC_FILE} against ${PREVIEW_URL}.

          Rules:
          - Do NOT read the existing e2e/ test files — derive all assertions from the spec only
          - Use baseURL from the Playwright config (already set to ${PREVIEW_URL} via BASE_URL env)
          - Cover every Given/When/Then scenario in the spec with a separate test
          - Use page.goto('/path'), getByRole(), getByText(), expect().toBeVisible(), toHaveURL() etc.
          - Write the file to ${TARGET_FILE} and stop — do not run it"

          if [ ! -s "${TARGET_FILE}" ]; then
            echo "Error: Verifier agent did not write ${TARGET_FILE}"
            exit 1
          fi

      - name: Run verification tests against preview
        id: verify
        env:
          CI: 'true'
          BASE_URL: ${{ steps.preview.outputs.url }}
          SPEC_ID: ${{ steps.spec.outputs.spec_id }}
        run: |
          npx playwright test "e2e/_verified-${SPEC_ID}.spec.ts" --reporter=line 2>&1 | tee /tmp/verify-output.txt
          if grep -q "passed" /tmp/verify-output.txt && ! grep -q "failed" /tmp/verify-output.txt; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
            # Extract failure summary (last 80 lines covers all test output)
            tail -80 /tmp/verify-output.txt > /tmp/verify-failures.txt
          fi

      - name: Commit verified tests for regression
        if: steps.verify.outputs.passed == 'true'
        env:
          SPEC_ID: ${{ steps.spec.outputs.spec_id }}
        run: |
          git config user.name "Verification Agent"
          git config user.email "verify-agent@github-actions.bot"
          git add "e2e/_verified-${SPEC_ID}.spec.ts"
          if ! git diff --staged --quiet; then
            git commit -m "test: save verified regression tests for ${SPEC_ID} [skip ci]"
            git push origin HEAD:${{ steps.pr.outputs.branch }}
          fi

      - name: Comment verification results
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.verify.outputs.passed }}' === 'true';
            const emoji = passed ? '✅' : '❌';
            const verdict = passed ? 'pass' : 'fail';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Verification: ${verdict}`,
            });

      - name: Retry dev agent with failure report
        if: steps.verify.outputs.passed != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.LOOP_PAT }}
        run: |
          FAILURE_REPORT=$(cat /tmp/verify-failures.txt)
          gh workflow run dev.yml \
            --field spec_file="${{ steps.spec.outputs.file }}" \
            --field failure_report="${FAILURE_REPORT}"

      - name: Fail if tests failed
        if: steps.verify.outputs.passed != 'true'
        run: exit 1

  verify-golden-cases:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tjansteman changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -qE "(tjansteman|review)"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: npm ci

      - name: Run golden case tests
        if: steps.check.outputs.should_run == 'true'
        run: npm run test:golden-cases

      - name: Comment golden case failure
        if: failure() && steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Golden case tests failed. Tjänsteman behavior has changed unexpectedly.',
            });
