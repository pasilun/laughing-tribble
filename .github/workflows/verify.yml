name: Verification Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]

jobs:
  verify:
    if: github.event.workflow_run?.conclusion == 'success' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=$(echo ${{ github.event.workflow_run.head_branch }} | grep -oP 'pr-\K\d+')" >> $GITHUB_OUTPUT
          fi

      - name: Find spec file
        id: spec
        run: |
          SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f | head -n 1)
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run Verification Agent
        uses: anthropic/claude-action@v1
        id: verify
        with:
          prompt: |
            Verify the app against the spec at ${{ steps.spec.outputs.file }}

            Preview URL: ${{ steps.deploy.outputs.url }}

            Test ALL acceptance criteria in the spec.
            Return a structured pass/fail report.
          system-prompt: agents/verifier/system-prompt.md
          max-tokens: 8000

      - name: Parse verification result
        id: result
        run: |
          RESULT='${{ steps.verify.outputs.result }}'
          echo "verdict=$(echo $RESULT | jq -r '.verdict')" >> $GITHUB_OUTPUT

      - name: Comment verification results
        uses: actions/github-script@v7
        with:
          script: |
            const result = JSON.parse('${{ steps.verify.outputs.result }}');
            const emoji = result.verdict === 'pass' ? '✅' : '❌';
            let body = `${emoji} Verification: ${result.verdict}\n\n`;
            body += `**Criteria:** ${result.criteria.filter(c => c.status === 'pass').length}/${result.criteria.length} passed\n\n`;
            
            result.criteria.forEach(c => {
              if (c.status === 'fail') {
                body += `❌ ${c.id}: ${c.evidence}\n`;
              }
            });

            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if verification failed
        if: steps.result.outputs.verdict != 'pass'
        run: exit 1

  verify-golden-cases:
    if: |
      contains(github.event.pull_request.changed_files, 'tjansteman') ||
      contains(github.event.pull_request.changed_files, 'review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run golden case tests
        run: |
          # Run tests against all golden cases
          npm run test:golden-cases

      - name: Comment golden case results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Golden case tests failed. Tjänsteman behavior has changed unexpectedly.'
            })
