name: Verification Agent

on:
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify (e.g. 18)'
        required: true

jobs:
  verify:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number, sha;
            if (context.eventName === 'pull_request') {
              number = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
            } else if (context.eventName === 'workflow_dispatch') {
              number = parseInt('${{ inputs.pr_number }}');
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
              });
              sha = pr.head.sha;
            } else {
              // workflow_run: find the latest open feat/ PR
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
              });
              const pr = prs.find(p => p.head.ref.startsWith('feat/'));
              if (!pr) { core.setFailed('No open feat/ PR found'); return; }
              number = pr.number;
              sha = pr.head.sha;
            }
            core.setOutput('number', String(number));
            core.setOutput('sha', sha);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Start app server
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Server ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        id: tests
        env:
          CI: 'true'
          BASE_URL: 'http://localhost:3000'
        run: npm test && echo "passed=true" >> $GITHUB_OUTPUT || echo "passed=false" >> $GITHUB_OUTPUT

      - name: Comment verification results
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.tests.outputs.passed }}' === 'true';
            const emoji = passed ? '✅' : '❌';
            const verdict = passed ? 'pass' : 'fail';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Verification: ${verdict}`,
            });

      - name: Fail if verification failed
        if: steps.tests.outputs.passed != 'true'
        run: exit 1

  verify-golden-cases:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tjansteman changes
        id: check
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -qE "(tjansteman|review)"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: npm ci

      - name: Run golden case tests
        if: steps.check.outputs.should_run == 'true'
        run: npm run test:golden-cases

      - name: Comment golden case failure
        if: failure() && steps.check.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Golden case tests failed. Tjänsteman behavior has changed unexpectedly.',
            });
