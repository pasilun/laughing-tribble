name: Verification Agent

on:
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify (e.g. 18)'
        required: true

jobs:
  verify:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: write
      contents: write
      issues: write
    steps:
      - name: Resolve PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let number, sha, branch;
            if (context.eventName === 'pull_request') {
              number = context.payload.pull_request.number;
              sha = context.payload.pull_request.head.sha;
              branch = context.payload.pull_request.head.ref;
            } else if (context.eventName === 'workflow_dispatch') {
              number = parseInt('${{ inputs.pr_number }}');
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: number,
              });
              sha = pr.head.sha;
              branch = pr.head.ref;
            } else {
              // workflow_run: find the latest open feat/ PR
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
              });
              const pr = prs.find(p => p.head.ref.startsWith('feat/'));
              if (!pr) { core.setFailed('No open feat/ PR found'); return; }
              number = pr.number;
              sha = pr.head.sha;
              branch = pr.head.ref;
            }
            core.setOutput('number', String(number));
            core.setOutput('sha', sha);
            core.setOutput('branch', branch);

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview to Vercel
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          OUTPUT=$(npx vercel@54.1.0 --token $VERCEL_TOKEN --yes 2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v 'vercel\.com' | head -1)
          echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Find spec file
        id: spec
        run: |
          BRANCH="${{ steps.pr.outputs.branch }}"
          SPEC_NAME="${BRANCH#feat/}"
          SPEC_FILE=$(find specs -name "${SPEC_NAME}.md" -not -name "_template.md" | head -1)
          if [ -z "$SPEC_FILE" ]; then
            SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" | sort | tail -1)
          fi
          SPEC_ID=$(basename "$SPEC_FILE" .md)
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT
          echo "spec_id=$SPEC_ID" >> $GITHUB_OUTPUT
          echo "Found spec: $SPEC_FILE (ID: $SPEC_ID)"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Verification Agent (interactive)
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          SPEC_FILE: ${{ steps.spec.outputs.file }}
          SPEC_ID: ${{ steps.spec.outputs.spec_id }}
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        run: |
          TARGET_FILE="e2e/_verified-${SPEC_ID}.spec.ts"
          npx opencode-ai@1.15.3 run --model zai-coding-plan/glm-4.7 --dangerously-skip-permissions "
          Read agents/verifier/system-prompt.md for your role and rules.

          Spec file: ${SPEC_FILE}
          Preview URL: ${PREVIEW_URL}
          Spec ID: ${SPEC_ID}

          Use your Playwright browser tools to interactively test every acceptance criterion
          in ${SPEC_FILE} against ${PREVIEW_URL}. Navigate the live page, interact with it,
          and verify each Given/When/Then scenario — including the Verifier Hints section.

          When finished:
          1. Write your verdict to /tmp/verify-result.json:
             { \"passed\": true or false, \"failures\": [\"exact description of each failing scenario\"] }
          2. Write a Playwright regression test file to ${TARGET_FILE} covering all scenarios
             (use baseURL from Playwright config — do NOT hardcode the preview URL)"

      - name: Parse verdict
        id: verify
        run: |
          if [ ! -f /tmp/verify-result.json ]; then
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Verifier agent did not write /tmp/verify-result.json" > /tmp/verify-failures.txt
          elif jq -e '.passed == true' /tmp/verify-result.json >/dev/null 2>&1; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            jq -r '(.failures // ["No failure details provided"]) | join("\n")' \
              /tmp/verify-result.json > /tmp/verify-failures.txt 2>/dev/null \
              || cp /tmp/verify-result.json /tmp/verify-failures.txt 2>/dev/null \
              || echo "Could not parse verify-result.json" > /tmp/verify-failures.txt
          fi

      - name: Commit verified tests for regression
        if: steps.verify.outputs.passed == 'true'
        env:
          SPEC_ID: ${{ steps.spec.outputs.spec_id }}
        run: |
          git config user.name "Verification Agent"
          git config user.email "verify-agent@github-actions.bot"
          git add "e2e/_verified-${SPEC_ID}.spec.ts"
          if ! git diff --staged --quiet; then
            git commit -m "test: save verified regression tests for ${SPEC_ID} [skip ci]"
            git push origin HEAD:${{ steps.pr.outputs.branch }}
          fi

      - name: Comment verification results
        if: steps.pr.outputs.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const passed = '${{ steps.verify.outputs.passed }}' === 'true';
            const emoji = passed ? '✅' : '❌';
            const verdict = passed ? 'pass' : 'fail';
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} Verification: ${verdict}`,
            });

      - name: Retry, escalate, or stop
        if: steps.verify.outputs.passed != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.LOOP_PAT }}
          REPO: ${{ github.repository }}
          SPEC_FILE: ${{ steps.spec.outputs.file }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          git fetch origin main 2>/dev/null || true
          C=$(git rev-list --count HEAD ^origin/main 2>/dev/null || echo "0")
          MAX="${{ vars.LOOP_MAX_ATTEMPTS || '3' }}"
          STOP_AT=$((MAX + 1))
          echo "Attempt $C of $MAX (commits ahead of main: $C)"
          FAILURE_REPORT=$(cat /tmp/verify-failures.txt)

          if [ "$C" -ge "$STOP_AT" ]; then
            # MAX normal attempts + 1 escalated (glm-5.1) attempt all failed.
            gh issue create -R "$REPO" \
              --title "🆘 Dev loop exhausted on ${SPEC_FILE}" \
              --label bug \
              --body "${MAX} attempts plus the escalated (glm-5.1) attempt all failed verification on \`${BRANCH}\`.

          Latest failures:
          \`\`\`
          ${FAILURE_REPORT}
          \`\`\`
          Human intervention required." || true
            [ -n "$PR_NUMBER" ] && gh pr comment "$PR_NUMBER" --body "🆘 Exhausted ${MAX} attempts + escalation. Opened an issue for human help." || true
            echo "Loop terminated — not re-dispatching."
          else
            if [ "$C" -ge "$MAX" ]; then
              [ -n "$PR_NUMBER" ] && gh pr comment "$PR_NUMBER" --body "⚠️ Attempt ${C}/${MAX} failed — all ${MAX} normal attempts exhausted. Escalating to the stronger model (glm-5.1) — **approve the queued Dev Agent run** in the Actions tab (Environment: \`escalation\`) to proceed." || true
            else
              [ -n "$PR_NUMBER" ] && gh pr comment "$PR_NUMBER" --body "❌ Attempt ${C}/${MAX} failed verification — retrying." || true
            fi
            if ! gh workflow run dev.yml \
                 --field spec_file="${SPEC_FILE}" \
                 --field failure_report="${FAILURE_REPORT}"; then
              # The loop's most dangerous failure mode is a silent stall:
              # if LOOP_PAT is missing/expired the dispatch fails and the
              # loop just stops with no signal. Make it loud.
              gh issue create -R "$REPO" \
                --title "🔴 Dev loop stalled: retry dispatch failed (${SPEC_FILE})" \
                --label bug \
                --body "Could not dispatch the next dev attempt for \`${BRANCH}\`. The \`LOOP_PAT\` secret is likely missing or expired. The loop is stalled until this is fixed." || true
              [ -n "$PR_NUMBER" ] && gh pr comment "$PR_NUMBER" --body "🔴 Loop stalled — retry dispatch failed (check \`LOOP_PAT\`)." || true
              exit 1
            fi
          fi

      - name: Fail if tests failed
        if: steps.verify.outputs.passed != 'true'
        run: exit 1
