name: Verification Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["Dev Agent"]
    types: [completed]

jobs:
  verify:
    if: github.event.workflow_run?.conclusion == 'success' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "number=$(echo ${{ github.event.workflow_run.head_branch }} | grep -oP 'pr-\K\d+')" >> $GITHUB_OUTPUT
          fi

      - name: Find spec file
        id: spec
        run: |
          SPEC_FILE=$(find specs -name "*.md" -not -name "_template.md" -type f | head -n 1)
          echo "file=$SPEC_FILE" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Deploy preview to Vercel
        id: deploy
        run: |
          # Install Vercel CLI
          npm i -g vercel

          # Deploy to Vercel (uses VERCEL_TOKEN and VERCEL_ORG_ID secrets)
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} --yes)
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT

      - name: Run Verification Agent
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          npx opencode verifier-agent \
            --spec-file "${{ steps.spec.outputs.file }}" \
            --preview-url "${{ steps.deploy.outputs.url }}" \
            --system-prompt "agents/verifier/system-prompt.md" \
            --output-file verification-result.json

      - name: Parse verification result
        id: result
        run: |
          VERDICT=$(cat verification-result.json | jq -r '.verdict')
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "result=$(cat verification-result.json | jq -c .)" >> $GITHUB_OUTPUT

      - name: Comment verification results
        uses: actions/github-script@v7
        with:
          script: |
            const result = JSON.parse('${{ steps.result.outputs.result }}');
            const emoji = result.verdict === 'pass' ? '✅' : '❌';
            let body = `${emoji} Verification: ${result.verdict}\n\n`;
            body += `**Criteria:** ${result.criteria.filter(c => c.status === 'pass').length}/${result.criteria.length} passed\n\n`;
            
            result.criteria.forEach(c => {
              if (c.status === 'fail') {
                body += `❌ ${c.id}: ${c.evidence}\n`;
              }
            });

            github.rest.issues.createComment({
              issue_number: ${{ steps.pr.outputs.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if verification failed
        if: steps.result.outputs.verdict != 'pass'
        run: exit 1

  verify-golden-cases:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for tjansteman changes
        id: check
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          
          # Check if any changed files contain 'tjansteman' or 'review'
          if echo "$CHANGED_FILES" | grep -E "(tjansteman|review)"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run golden case tests
        if: steps.check.outputs.should_run == 'true'
        run: |
          npm run test:golden-cases

      - name: Comment golden case results
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Golden case tests failed. Tjänsteman behavior has changed unexpectedly.'
            })
