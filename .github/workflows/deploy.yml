name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["Auto Merge"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel@54.1.0 --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run regression tests against production
        id: regression
        env:
          CI: 'true'
          BASE_URL: 'https://laughing-tribble-psi.vercel.app'
        run: |
          if ls e2e/_verified-*.spec.ts 1>/dev/null 2>&1; then
            npx playwright test e2e/_verified-*.spec.ts --reporter=line \
              && echo "passed=true" >> $GITHUB_OUTPUT \
              || echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "No regression tests yet — skipping"
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Open issue on regression failure
        if: steps.regression.outputs.passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 Regression detected on production',
              body: `Regression tests failed after deploy of \`${context.sha.slice(0,7)}\`.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug'],
            });
