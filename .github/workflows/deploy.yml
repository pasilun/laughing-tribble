name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["Auto Merge"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel@54.1.0 --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Contract regression: the _verified-* suite is DETERMINISTIC ONLY in
      # preview (the chat seam serves the scripted fake when
      # VERCEL_ENV != production). Running it against prod (real model)
      # always false-fails. So run it against a fresh preview of main.
      - name: Deploy preview for contract regression
        id: preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          OUT=$(npx vercel@54.1.0 --token "$VERCEL_TOKEN" --yes 2>&1)
          echo "$OUT"
          URL=$(echo "$OUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | grep -v 'vercel\.com' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Contract regression (deterministic, vs preview)
        id: regression
        env:
          CI: 'true'
          BASE_URL: ${{ steps.preview.outputs.url }}
        run: |
          if ls e2e/_verified-*.spec.ts 1>/dev/null 2>&1; then
            npx playwright test e2e/_verified-*.spec.ts --reporter=line \
              && echo "passed=true" >> $GITHUB_OUTPUT \
              || echo "passed=false" >> $GITHUB_OUTPUT
          else
            echo "No regression tests yet — skipping"
            echo "passed=true" >> $GITHUB_OUTPUT
          fi

      # Prod smoke: environment-agnostic availability only — no fake/LLM
      # assertions. Confirms the production deploy itself is healthy.
      - name: Production smoke
        id: smoke
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          ok=true
          for path in / /design; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${PROD_URL}${path}")
            echo "GET ${path} -> ${code}"
            [ "$code" = "200" ] || ok=false
          done
          [ "$ok" = "true" ] && echo "passed=true" >> "$GITHUB_OUTPUT" || echo "passed=false" >> "$GITHUB_OUTPUT"

      - name: Open issue on failure
        if: steps.regression.outputs.passed == 'false' || steps.smoke.outputs.passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const reg = '${{ steps.regression.outputs.passed }}' === 'false';
            const smoke = '${{ steps.smoke.outputs.passed }}' === 'false';
            const what = [reg && 'contract regression (preview)', smoke && 'production smoke'].filter(Boolean).join(' + ');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Post-deploy failure: ${what}`,
              body: `Failed after deploy of \`${context.sha.slice(0,7)}\`: ${what}.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug'],
            });
